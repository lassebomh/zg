<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>public</title>
    <style>
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: monospace;
        font-size: 16px;
      }
      #frameTime {
        position: fixed;
        top: 0;
        right: 0;
        color: white;
        background-color: black;
        font-size: small;
        font-weight: bold;
        padding: 1px 2px;
      }
      #cursor {
        position: fixed;
        width: 8px;
        height: 8px;
        background-color: red;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
    <div id="frameTime"></div>
    <div id="cursor"></div>
  </body>
</html>
