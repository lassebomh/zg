<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Debugger</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: monospace;
      }
      html,
      body {
        height: 100%;
        background: #000;
        color: #ccc;
        font-family: monospace;
        font-size: 13px;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        position: relative;
      }

      .yaml {
        .y-key {
          color: #9cdcfe;
        }
        .y-colon {
          color: #888;
        }
        .y-str {
          color: #ce9178;
        }
        .y-num {
          color: #b5cea8;
        }
        .y-bool {
          color: #569cd6;
          font-weight: 700;
        }
        .y-null {
          color: #569cd6;
          font-weight: 500;
          font-style: italic;
        }
        .y-dash {
          color: #888;
        }
        .y-bracket {
          color: #888;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- temp canvas -->
      <canvas
        id="canvas1"
        style="position: absolute; top: 0; left: 0; right: 33%; bottom: 50%; width: auto; height: auto"
      ></canvas>
      <canvas
        id="canvas3"
        style="position: absolute; top: 50%; left: 0; right: 33%; bottom: 0%; width: auto; height: auto"
      ></canvas>
      <canvas
        id="canvas4"
        style="position: absolute; top: 0%; left: 50%; right: 0%; bottom: 0%; width: auto; height: auto"
      ></canvas>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
